<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <main>
        <section id="popup">
            <h2>TETRIS</h2>
            <p>Press any button for starting game.</p>
        </section>
        <section id="board">
            <div class="data_container">
                <h3>Line</h3>
                <span>0</span>
            </div>
            <div class="data_container">
                <h3>Score</h3>
                <span>0</span>
            </div>
        </section>
        <section id="playground">
            <canvas id="hold" width="40" height="40"></canvas>
            <canvas id="field" width="100" height="220"></canvas>
            <canvas id="next" width="40" height="120"></canvas>
        </section>
    </main>
    <script src="tetris.js"></script>
</body>

</html>
